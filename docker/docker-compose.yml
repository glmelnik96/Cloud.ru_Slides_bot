services:
  redis:
    image: redis/redis-stack-server:7.4.0-v0
    container_name: slides-bot-redis
    restart: unless-stopped
    command: >
      redis-stack-server
      --save 3600 1
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Dev-only S3 backend. In prod, point S3_ENDPOINT_URL at s3.cloud.ru and drop this service.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: slides-bot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"  # S3 API
      - "127.0.0.1:9001:9001"  # web console
    volumes:
      - minio-data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  # One-shot job: creates the bucket on first compose-up, then exits 0.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: slides-bot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks: [internal]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      echo 'bucket ready: '$$S3_BUCKET
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    restart: "no"

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: slides-bot-bot
    restart: unless-stopped
    env_file: ../.env
    environment:
      # Make /app importable as an ABSOLUTE path entry, independent of CWD.
      # Top-level packages (renderers, scripts) are imported lazily mid-task;
      # relying on the implicit cwd entry breaks them if anything shifts cwd.
      PYTHONPATH: /app
      # Shared input-deck dir mounted into the worker at the same path. Without
      # this, parse_node in the worker container can't see the .pptx the bot
      # downloaded — each container has its own /tmp.
      SLIDESBOT_INPUTS_DIR: /var/lib/slidesbot/inputs
      # Per-session workdir lives on a shared volume too so the bot can read
      # result.pptx for send_document on terminal DONE.
      SLIDESBOT_WORKDIR: /var/lib/slidesbot/sessions
    volumes:
      - slidesbot-inputs:/var/lib/slidesbot/inputs
      - slidesbot-sessions:/var/lib/slidesbot/sessions
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [internal]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: slides-bot-worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      # See bot service: absolute /app on the path so lazily-imported
      # top-level packages (renderers, scripts) resolve regardless of cwd.
      PYTHONPATH: /app
      SLIDESBOT_INPUTS_DIR: /var/lib/slidesbot/inputs
      SLIDESBOT_WORKDIR: /var/lib/slidesbot/sessions
    volumes:
      - slidesbot-inputs:/var/lib/slidesbot/inputs
      - slidesbot-sessions:/var/lib/slidesbot/sessions
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    # Single replica in M1; bumped later when LangGraph nodes land.
    deploy:
      replicas: 1

networks:
  internal:
    driver: bridge

volumes:
  redis-data:
  minio-data:
  # Shared between bot and worker so the bot's downloaded .pptx is visible
  # to the worker's parse_node. Goes away with M5 (S3 transit).
  slidesbot-inputs:
  # Worker writes per-session artefacts (plan.json, built.pptx, result.pptx,
  # pngs/) here; bot reads result.pptx for send_document on DONE.
  slidesbot-sessions:
